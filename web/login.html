<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Product Catalogue</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">

  <script>
    window.ENV = {
      SUPABASE_URL:      "https://txxkearoajgchblunzrt.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4eGtlYXJvYWpnY2hibHVuenJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxODUzMjksImV4cCI6MjA5Mzc2MTMyOX0.D2cp4lrBvCPLpr3ayboGeKR4gisukV-llod5v4bVPko"
    };
  </script>

  <div class="bg-white rounded-2xl shadow-sm p-8 w-full max-w-sm space-y-6">
    <div>
      <h1 class="text-xl font-bold text-gray-800">Product Catalogue</h1>
      <p class="text-sm text-gray-400 mt-1">Sign in to continue</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input id="username" type="text" required autocomplete="username"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
               placeholder="e.g. john">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
               placeholder="••••••••">
      </div>

      <p id="error-msg" class="hidden text-sm text-red-500"></p>

      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
        Sign in
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);

    // Already logged in? Go straight to catalogue
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) location.replace("index.html");
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn  = e.target.querySelector("button[type=submit]");
      const errEl = document.getElementById("error-msg");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      errEl.classList.add("hidden");

      const username = document.getElementById("username").value.trim().toLowerCase();
      const { error } = await db.auth.signInWithPassword({
        email:    username + "@staff.internal",
        password: document.getElementById("password").value,
      });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Sign in";
      } else {
        location.replace("index.html");
      }
    });
  </script>
</body>
</html>
